            width: 80%;

        .icon-container {
            font-size: 80px;
            color: #D97706;
            margin-bottom: 30px;
        }
        .main-title {
            font-size: 64px;
            font-weight: 800;
            color: #1A202C;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        .sub-title {
            font-size: 40px;
            font-weight: 800;
            color: #D97706;
            margin-bottom: 40px;
            line-height: 1.5;
        }
        .ruby-text {
            font-size: 24px;
            color: #2D3748;
            font-weight: 500;
            display: block;
            margin-top: -10px;
            margin-bottom: 20px;
        }
        .badge-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }
        .badge {
            background-color: #2D3748;
            color: #FFFFFF;
            font-size: 24px;
            font-weight: 500;

            <h2 class="sub-title">Google Meet<br>
