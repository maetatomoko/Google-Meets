<html lang="ja"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;800&amp;display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans JP', sans-serif; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background-color: #FFFFFF;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .header {
            background-color: #1A202C;
            padding-top: 30px; /* keep upper padding */
            padding-bottom: 20px; /* reduced to save height */
            padding-left: 60px;
        }
        .slide-title {
            font-size: 40px;
            font-weight: 800;
            color: #FFFFFF;
        }
        .content-area {
            flex: 1;
            padding-top: 24px; /* reduced */
            padding-left: 80px;
            padding-right: 80px;
            display: flex;
            flex-direction: column;
        }
        .headline {
            font-size: 36px;
            font-weight: 800;
            color: #D97706;
            margin-bottom: 20px; /* reduced */
            text-align: center;
        }
        .main-content {
            display: flex;
            gap: 30px; /* reduced */
            margin-bottom: 16px; /* reduced */
        }
        .steps-list {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            gap: 10px; /* reduced */
        }
        .step-item {
            display: flex;
            align-items: flex-start;
            font-size: 26px;
            font-weight: 500;
            color: #2D3748;
            line-height: 1.6;
        }
        .step-number {
            background-color: #1A202C;
            color: #FFFFFF;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 800;
            font-size: 24px;
            margin-right: 20px;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .highlight-text {
            color: #D97706;
            font-weight: 800;
        }
        .visual-area {
            flex: 0.8;
            display: flex;
            flex-direction: column;
            gap: 16px; /* reduced */
        }
        .url-box {
            border: 4px solid #2D3748;
            border-radius: 16px;
            padding-top: 12px; /* reduced */
            padding-bottom: 12px; /* reduced */
            padding-left: 20px;
            padding-right: 20px;
            text-align: center;
            background-color: #F7FAFC;
        }
        .url-title {
            font-size: 24px;
            font-weight: 800;
            color: #1A202C;
            margin-bottom: 10px; /* slightly reduced */
        }
        .url-link {
            font-size: 22px;
            color: #3182CE;
            text-decoration: underline;
            word-break: break-all;
            font-weight: 500;
        }
        .button-box {
            border: 4px solid #D97706;
            border-radius: 16px;
            padding-top: 16px; /* reduced */
            padding-bottom: 16px; /* reduced */
            text-align: center;
            background-color: rgba(217, 119, 6, 0.1);
        }
        .mock-button {
            background-color: #3182CE;
            color: #FFFFFF;
            font-size: 28px;
            font-weight: 800;
            padding: 15px 30px;
            border-radius: 50px;
            display: inline-block;
            margin-top: 12px; /* slightly reduced */
        }
        .summary-box {
            background-color: #1A202C;
            border-radius: 16px;
            padding-top: 12px; /* reduced */
            padding-bottom: 12px; /* reduced */
            text-align: center;
            margin-top: 18px; /* fixed smaller gap instead of auto */
            margin-bottom: 12px; /* reduced */
        }
        .summary-text {
            font-size: 32px;
            font-weight: 800;
            color: #FFFFFF;
        }
    </style>

<style>
  [size="1"] { font-size: 12px !important; }
  [size="2"] { font-size: 14px !important; }
  [size="3"] { font-size: 16px !important; }
  [size="4"] { font-size: 24px !important; }
  [size="5"] { font-size: 32px !important; }
  [size="6"] { font-size: 48px !important; }
  [size="7"] { font-size: 72px !important; }
  </style>

<body>
    <div class="slide-container">
        <div class="header">
            <h2 class="slide-title">ステップ② 会議に参加する（URLをタップ）</h2>
        </div>
        
        <div class="content-area">
            <div class="headline">
                幹事から届いたURLをタップするだけで会議に入れます
            </div>
            
            <div class="main-content">
                <div class="steps-list">
                    <div class="step-item">
                        <div class="step-number">1</div>
                        <div>LINEやメールで届いた「会議のURL」をタップ</div>
                    </div>
                    <div class="step-item">
                        <div class="step-number">2</div>
                        <div>Google Meetアプリが自動で開く</div>
                    </div>
                    <div class="step-item">
                        <div class="step-number">3</div>
                        <div>自分の顔が映っているか確認する</div>
                    </div>
                    <div class="step-item">
                        <div class="step-number">4</div>
                        <div>画面の <span class="highlight-text">「参加をリクエスト」</span> をタップ</div>
                    </div>
                    <div class="step-item">
                        <div class="step-number">5</div>
                        <div>幹事が承認したら会議に入れます</div>
                    </div>
                </div>
                
                <div class="visual-area">
                    <div class="url-box">
                        <div class="url-title"><i class="fas fa-link" style="color: #D97706; margin-right: 10px;"></i>URLの例</div>
                        <div class="url-link">meet.google.com/abc-defg-hij</div>
                    </div>
                    
                    <div class="button-box">
                        <div style="font-size: 24px; font-weight: 800; color: #1A202C;">このボタンをタップ！</div>
                        <div class="mock-button">参加をリクエスト</div>
                    </div>
                </div>
            </div>
            
            <div class="summary-box">
                <div class="summary-text">
                    <i class="fas fa-hand-pointer" style="color: #D97706; margin-right: 15px;"></i>
                    送られてきたリンクをタップするだけでOKです！
                </div>
            </div>
        </div>
    </div>
