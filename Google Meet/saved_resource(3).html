            flex-direction: column;

            padding-top: 30px;
            padding-bottom: 30px;
            padding-left: 60px;

        .slide-title {
            font-size: 40px;
            font-weight: 800;

            margin-bottom: 20px;

        .step-icon {
            font-size: 60px;
            color: #1A202C;
            margin-bottom: 20px;
        }
        .step-text {
            font-size: 24px;
            font-weight: 800;
            color: #2D3748;
            line-height: 1.5;
        }
        .arrow-icon {
            font-size: 40px;
            color: #D97706;
            margin-left: 20px;
            margin-right: 20px;
        }
        .summary-box {
            background-color: #1A202C;
            border-radius: 16px;
            padding-top: 20px;
            padding-bottom: 20px;
            text-align: center;
            margin-top: auto;
            margin-bottom: 30px;
        }
        .summary-text {
            font-size: 32px;
            font-weight: 800;
            color: #FFFFFF;

        <div class="header">
            <h2 class="slide-title">参加までの3ステップ（全体の流れ）</h2>
        </div>
        
        <div class="content-area">
            <div class="headline">
                参加は「アプリ入れる → URLをタップ → 許可する」の3ステップ
            </div>
            
            <div class="steps-container">
                <!-- Step 1 -->
                <div class="step-box">
                    <div class="step-number">ステップ ①</div>
                    <i class="fas fa-download step-icon"></i>
                    <div class="step-text">アプリを<br>インストールする</div>
                </div>
                
                <i class="fas fa-arrow-right arrow-icon"></i>
                
                <!-- Step 2 -->
                <div class="step-box">
                    <div class="step-number">ステップ ②</div>
                    <i class="fas fa-hand-pointer step-icon"></i>
                    <div class="step-text">送られてきたURLを<br>タップする</div>
                </div>
                
                <i class="fas fa-arrow-right arrow-icon"></i>
                
                <!-- Step 3 -->
                <div class="step-box">
                    <div class="step-number">ステップ ③</div>
                    <i class="fas fa-check-circle step-icon"></i>
                    <div class="step-text">マイクとカメラの<br>使用を「許可」する</div>
                </div>
            </div>
            
            <div class="summary-box">
                <div class="summary-text">
                    <i class="fas fa-play-circle" style="color: #D97706; margin-right: 15px;"></i>
                    まずはアプリの準備から始めましょう！
                </div>
            </div>
        </div>
    </div>
