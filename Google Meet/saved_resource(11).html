<html lang="ja"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;800&amp;display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans JP', sans-serif; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background-color: #FFFFFF;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .header {
            background-color: #1A202C;
            padding-top: 30px;
            height: 100px;
            padding-left: 60px;
        }
        .slide-title {
            font-size: 40px;
            font-weight: 800;
            color: #FFFFFF;
        }
        .content-area {
            flex: 1;
            padding-top: 30px;
            padding-left: 60px;
            padding-right: 60px;
            display: flex;
            flex-direction: column;
        }
        .headline {
            font-size: 36px;
            font-weight: 800;
            color: #D97706;
            margin-bottom: 30px;
            text-align: center;
        }
        .qa-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        /* Reduced each QA box height and slightly tightened inner padding to cut overall height */
        .qa-box {
            border: 3px solid #2D3748;
            border-radius: 16px;
            padding-top: 16px;
            padding-left: 20px;
            padding-right: 20px;
            height: 170px; /* shrunk from 220px */
            background-color: #F7FAFC;
        }
        .question {
            font-size: 24px;
            font-weight: 800;
            color: #D97706;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }
        .question i {
            margin-right: 10px;
        }
        .answer {
            font-size: 22px;
            font-weight: 500;
            color: #1A202C;
            line-height: 1.6;
            border-top: 2px solid #E2E8F0;
            padding-top: 12px;
        }
        .highlight {
            font-weight: 800;
            color: #E53E3E;
        }
        .footer-note {
            background-color: #1A202C;
            color: #FFFFFF;
            border-radius: 16px;
            padding-top: 20px;
            height: 80px;
            text-align: center;
            margin-top: auto;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 800;
        }
    </style>
<!-- Manus style start -->
<style>
  [size="1"] { font-size: 12px !important; }
  [size="2"] { font-size: 14px !important; }
  [size="3"] { font-size: 16px !important; }
  [size="4"] { font-size: 24px !important; }
  [size="5"] { font-size: 32px !important; }
  [size="6"] { font-size: 48px !important; }
  [size="7"] { font-size: 72px !important; }
  </style>

</head>
<body>
    <div class="slide-container">
        <div class="header">
            <h2 class="slide-title">困ったときのよくある質問</h2>
        </div>
        
        <div class="content-area">
            <div class="headline">
                うまくいかないときは、まずここを確認しましょう
            </div>
            
            <div class="qa-grid">
                <!-- QA 1 -->
                <div class="qa-box">
                    <div class="question"><i class="fas fa-microphone-slash"></i> 声が相手に届かない</div>
                    <div class="answer">
                        マイクマークが<span class="highlight">赤くなっていないか</span>確認してください。赤はOFFの状態です。
                    </div>
                </div>
                
                <!-- QA 2 -->
                <div class="qa-box">
                    <div class="question"><i class="fas fa-video-slash"></i> 自分の顔が映らない</div>
                    <div class="answer">
                        カメラマークが<span class="highlight">赤くなっていないか</span>確認してください。タップしてONにします。
                    </div>
                </div>
                
                <!-- QA 3 -->
                <div class="qa-box">
                    <div class="question"><i class="fas fa-sign-in-alt"></i> 会議に入れない</div>
                    <div class="answer">
                        URLを正しくタップしたか確認してください。一度アプリを閉じて、<span class="highlight">もう一度URLをタップ</span>してみましょう。
                    </div>
                </div>
                
                <!-- QA 4 -->
                <div class="qa-box">
                    <div class="question"><i class="fas fa-volume-up"></i> 相手の声が聞こえない</div>
                    <div class="answer">
                        スマホ本体の<span class="highlight">音量を上げて</span>ください。イヤホンが刺さったままになっていないかも確認！
                    </div>
                </div>
            </div>
            
            <div class="footer-note">
                <i class="fas fa-comment-dots" style="color: #D97706; margin-right: 15px;"></i>
                困ったときは遠慮なく幹事に連絡してください！
            </div>
        </div>
    </div>
