<html lang="ja"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;800&amp;display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans JP', sans-serif; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background-color: #FFFFFF;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .header {
            background-color: #1A202C;
            padding-top: 30px;
            padding-bottom: 30px;
            padding-left: 60px;
        }
        .slide-title {
            font-size: 40px;
            font-weight: 800;
            color: #FFFFFF;
        }
        .content-area {
            flex: 1;
            padding-top: 30px;
            padding-left: 80px;
            padding-right: 80px;
            display: flex;
            flex-direction: column;
        }
        .headline {
            font-size: 36px;
            font-weight: 800;
            color: #D97706;
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.5;
        }
        .main-content {
            display: flex;
            gap: 60px;
            align-items: center;
            margin-bottom: 30px;
        }
        .visual-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .big-icon {
            font-size: 200px;
            color: #2D3748;
        }
        .list-area {
            flex: 2;
        }
        .feature-list {
            list-style: none;
        }
        .feature-item {
            font-size: 28px;
            font-weight: 500;
            color: #2D3748;
            margin-bottom: 20px;
            line-height: 1.6;
            display: flex;
            align-items: flex-start;
        }
        .check-icon {
            color: #D97706;
            font-size: 32px;
            margin-right: 20px;
            margin-top: 5px;
        }
        .summary-box {
            background-color: rgba(217, 119, 6, 0.1);
            border: 4px solid #D97706;
            border-radius: 16px;
            padding-top: 20px;
            padding-bottom: 20px;
            text-align: center;
            margin-top: auto;
            margin-bottom: 30px;
        }
        .summary-text {
            font-size: 32px;
            font-weight: 800;
            color: #1A202C;
        }
    </style>

                「Google Meet」は、スマホで顔を見ながら話せる無料のアプリです
            </div>
            
            <div class="main-content" data-ms-id="ms-17" data-ms-type="block">
                <div class="visual-area" data-ms-id="ms-16" data-ms-type="block">

                        <li class="feature-item">
                            <i class="fas fa-check-circle check-icon" data-ms-id="ms-13" data-ms-type="block"></i>
                            <div data-ms-id="ms-3" data-ms-type="text">離れた場所にいる仲間と、顔を見ながら話ができます</div>

                            <i class="fas fa-check-circle check-icon" data-ms-id="ms-12" data-ms-type="block"></i>

                </div>
            </div>
            
            <div class="summary-box" data-ms-id="ms-9" data-ms-type="block">
                <div class="summary-text" data-ms-id="ms-7" data-ms-type="text">
                    <i class="fas fa-mobile-alt" style="color: #D97706; margin-right: 15px;" data-ms-id="ms-8" data-ms-type="block"></i>
