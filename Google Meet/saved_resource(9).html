            width: 1280px;
            min-height: 720px; /* keep as required */
            background-color: #FFFFFF;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .header {
            background-color: #1A202C;
            padding-top: 30px; /* do not change */
            height: 100px;
            padding-left: 60px;
        }
        .slide-title {
            font-size: 40px;
            font-weight: 800;
            color: #FFFFFF;
        }
        .content-area {
            flex: 1;
            padding-top: 40px;
            padding-left: 60px;
            padding-right: 60px;
            display: flex;
            flex-direction: column;
        }
        .headline {
            font-size: 36px;
            font-weight: 800;
            color: #D97706;

            text-align: center;
        }
        .tips-container {
            display: flex;
            gap: 20px; /* reduced from 30 */
            justify-content: space-between;
            margin-bottom: 20px; /* reduced from 40 */
        }
        .tip-card {
            flex: 1;
            border: 4px solid #2D3748;
            border-radius: 16px;
            padding-top: 20px; /* reduced from 40 */
            padding-left: 20px;
            padding-right: 20px;
            height: 320px; /* reduced from 400 */
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .tip-icon {
            font-size: 70px;
            color: #D97706;
            margin-bottom: 20px; /* reduced from 30 */
            height: 60px;
            display: flex;
            align-items: center;
        }
        .tip-title {
            font-size: 28px;
            font-weight: 800;
            color: #1A202C;
            margin-bottom: 16px; /* slightly reduced */
            line-height: 1.4;
        }
        .tip-desc {
            font-size: 22px;
            font-weight: 500;
            color: #2D3748;
            line-height: 1.6;
            text-align: left;
        }
        .summary-box {
            background-color: #1A202C;
            border-radius: 16px;
            padding-top: 12px; /* reduced from 20 */
            height: 80px;
            text-align: center;
            margin-top: auto;
            margin-bottom: 20px; /* reduced from 40 */
        }
        .summary-text {
            font-size: 28px;
            font-weight: 800;
            color: #FFFFFF;
        }

    <div class="slide-container">
        <div class="header">
            <h2 class="slide-title">もっと便利に！見やすくするコツ</h2>
        </div>
        
        <div class="content-area">
            <div class="headline">
                スマホを横向きにすると、みんなの顔が見やすくなります
            </div>
            
            <div class="tips-container">
                <!-- Tip 1 -->
                <div class="tip-card">
                    <div class="tip-icon"><i class="fas fa-mobile-alt fa-rotate-90"></i></div>
                    <div class="tip-title">スマホを横にする</div>
                    <div class="tip-desc">
                        画面が広くなり、参加者の顔が大きく表示されます。動画を見るときのように横に持ちましょう。
                    </div>
                </div>
                
                <!-- Tip 2 -->
                <div class="tip-card">
                    <div class="tip-icon"><i class="fas fa-volume-up"></i></div>
                    <div class="tip-title">音量の調節</div>
                    <div class="tip-desc">
                        声が小さいときは、スマホ本体の横にあるボタンで上げてください。画面右上のスピーカーマークも確認！
                    </div>
                </div>
                
                <!-- Tip 3 -->
                <div class="tip-card">
                    <div class="tip-icon"><i class="fas fa-battery-full"></i></div>
                    <div class="tip-title">充電しながら参加</div>
                    <div class="tip-desc">
                        ビデオ通話は電池を多く使います。充電器につないでおくと、途中で切れる心配がなくて安心です。
                    </div>
                </div>
            </div>
            
            <div class="summary-box">
                <div class="summary-text">
                    <i class="fas fa-star" style="color: #D97706; margin-right: 15px;"></i>
                    ちょっとした工夫で、会議がぐっと快適になります！
                </div>
            </div>
        </div>
    </div>
