<!DOCTYPE html>

<html lang="ja"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;800&amp;display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans JP', sans-serif; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background-color: #FFFFFF;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .header {
            background-color: #1A202C;
            padding-top: 25px;
            height: 100px;
            padding-left: 60px;
        }
        .slide-title {
            font-size: 40px;
            font-weight: 800;
            color: #FFFFFF;
        }
        .content-area {
            flex: 1;
            padding-top: 30px;
            padding-left: 80px;
            padding-right: 80px;
            display: flex;
            flex-direction: column;
        }
        .headline {
            font-size: 36px;
            font-weight: 800;
            color: #D97706;
            margin-bottom: 30px;
            text-align: center;
        }
        .columns-container {
            display: flex;
            gap: 40px;
            margin-bottom: 20px;
        }
        .os-column {
            flex: 1;
            border: 4px solid #2D3748;
            border-radius: 16px;
            padding-top: 20px;
            padding-left: 30px;
            padding-right: 30px;
            min-height: 380px;
        }
        .os-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            border-bottom: 2px solid #E2E8F0;
            height: 60px;
        }
        .os-icon {
            font-size: 40px;
            color: #1A202C;
        }
        .os-title {
            font-size: 32px;
            font-weight: 800;
            color: #1A202C;
        }
        .step-list {
            list-style: none;
        }
        .step-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 25px;
        }
        .step-num {
            background-color: #D97706;
            color: #FFFFFF;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: 800;
            flex-shrink: 0;
            margin-right: 15px;
            margin-top: 5px;
        }
        .step-text {
            font-size: 26px;
            font-weight: 500;
            color: #2D3748;
            line-height: 1.5;
        }
        .highlight {
            font-weight: 800;
            color: #1A202C;
        }
        .note-box {
            margin-top: auto;
            margin-bottom: 30px;
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            color: #2D3748;
            background-color: rgba(217, 119, 6, 0.1);
            border-radius: 16px;
            padding-top: 20px;
            height: 70px;
        }
    </style>
<!-- Manus style start -->
<style>
  [size="1"] { font-size: 12px !important; }
  [size="2"] { font-size: 14px !important; }
  [size="3"] { font-size: 16px !important; }
  [size="4"] { font-size: 24px !important; }
  [size="5"] { font-size: 32px !important; }
  [size="6"] { font-size: 48px !important; }
  [size="7"] { font-size: 72px !important; }
  </style>
<!-- Manus style end -->
</head>
<body>
    <div class="slide-container">
        <div class="header">
            <h2 class="slide-title">ステップ① アプリをインストールする</h2>
        </div>
        
        <div class="content-area">
            <div class="headline">
                「Google Meet」アプリを無料でインストールしましょう
            </div>
            
            <div class="columns-container">
                <!-- iPhone Column -->
                <div class="os-column">
                    <div class="os-header">
                        <i class="fab fa-apple os-icon"></i>
                        <div class="os-title">iPhoneの方</div>
                    </div>
                    <ul class="step-list">
                        <li class="step-item">
                            <div class="step-num">1</div>
                            <div class="step-text">「<span class="highlight">App Store</span>」を開く</div>
                        </li>
                        <li class="step-item">
                            <div class="step-num">2</div>
                            <div class="step-text">検索欄に「<span class="highlight">Google Meet</span>」と入力</div>
                        </li>
                        <li class="step-item">
                            <div class="step-num">3</div>
                            <div class="step-text">「<span class="highlight">入手</span>」をタップ<br>→ インストール完了</div>
                        </li>
                    </ul>
                </div>
                
                <!-- Android Column -->
                <div class="os-column">
                    <div class="os-header">
                        <i class="fab fa-android os-icon"></i>
                        <div class="os-title">Androidの方</div>
                    </div>
                    <ul class="step-list">
                        <li class="step-item">
                            <div class="step-num">1</div>
                            <div class="step-text">「<span class="highlight">Google Play</span>」を開く</div>
                        </li>
                        <li class="step-item">
                            <div class="step-num">2</div>
                            <div class="step-text">検索欄に「<span class="highlight">Google Meet</span>」と入力</div>
                        </li>
                        <li class="step-item">
                            <div class="step-num">3</div>
                            <div class="step-text">「<span class="highlight">インストール</span>」をタップ<br>→ インストール完了</div>
                        </li>
                    </ul>
                </div>
            </div>
            
            <div class="note-box">
                <i class="fas fa-info-circle" style="color: #D97706; margin-right: 10px;"></i>
                ※ すでにインストールされている場合はこのステップは不要です
            </div>
        </div>
    </div>
