    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans JP', sans-serif; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background-color: #FFFFFF;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .header {
            background-color: #1A202C;
            padding-top: 30px;
            height: 100px;
            padding-left: 60px;
        }
        .slide-title {
            font-size: 40px;
            font-weight: 800;
            color: #FFFFFF;
        }
        .content-area {
            flex: 1;
            padding-top: 40px;
            padding-left: 80px;
            padding-right: 80px;
            display: flex;
            flex-direction: column;
        }
        .headline {
            font-size: 36px;
            font-weight: 800;
            color: #D97706;
            margin-bottom: 40px;
            text-align: center;
        }
        .dialog-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            margin-bottom: 40px;
        }
        .dialog-box {
            flex: 1;
            border: 4px solid #2D3748;
            border-radius: 16px;
            padding-top: 30px;
            padding-left: 30px;
            padding-right: 30px;
            background-color: #F7FAFC;
            height: 280px; /* reduced from 320px to fit under 720px total */
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .dialog-icon {
            font-size: 50px;
            color: #4A5568;
            margin-bottom: 20px;
        }
        .dialog-text {
            font-size: 24px;
            font-weight: 800;
            color: #1A202C;
            text-align: center;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .allow-button {
            background-color: #D97706;
            color: #FFFFFF;
            font-size: 32px;
            font-weight: 800;
            padding-top: 15px;
            padding-left: 60px;
            padding-right: 60px;
            height: 70px;
            border-radius: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .hint-box {
            background-color: rgba(217, 119, 6, 0.1);
            border-left: 8px solid #D97706;
            padding-top: 25px;
            padding-left: 30px;
            padding-right: 30px;
            height: 120px;
            margin-top: auto;
            margin-bottom: 40px;
        }
        .hint-text {
            font-size: 26px;
            font-weight: 800;
            color: #2D3748;
            line-height: 1.6;
        }
    </style>

<style>
  [size="1"] { font-size: 12px !important; }
  [size="2"] { font-size: 14px !important; }
  [size="3"] { font-size: 16px !important; }
  [size="4"] { font-size: 24px !important; }
  [size="5"] { font-size: 32px !important; }
  [size="6"] { font-size: 48px !important; }
  [size="7"] { font-size: 72px !important; }

<body>
    <div class="slide-container">
        <div class="header">
            <h2 class="slide-title">ステップ③ マイクとカメラを「許可」する</h2>
        </div>
        
        <div class="content-area">
            <div class="headline">
                最初に一度だけ、スマホから「許可」を求められます
            </div>
            
            <div class="dialog-container">
                <!-- Microphone Dialog -->
                <div class="dialog-box">
                    <i class="fas fa-microphone dialog-icon"></i>
                    <div class="dialog-text">
                        「マイクへのアクセスを<br>許可しますか？」
                    </div>
                    <div class="allow-button">許可</div>
                </div>
                
                <!-- Camera Dialog -->
                <div class="dialog-box">
                    <i class="fas fa-camera dialog-icon"></i>
                    <div class="dialog-text">
                        「カメラへのアクセスを<br>許可しますか？」
                    </div>
                    <div class="allow-button">許可</div>
                </div>
            </div>
            
            <div class="hint-box">
                <div class="hint-text">
                    <i class="fas fa-lightbulb" style="color: #D97706; margin-right: 15px;"></i>
                    これを「許可」しないと、相手に声が届かなかったり、<br>
                    自分の顔が映らなくなります。必ず「許可」をタップしましょう。
                </div>
            </div>
        </div>
    </div>
