    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans JP', sans-serif; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background-color: #FFFFFF;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .header {
            background-color: #1A202C;
            padding-top: 30px;
            height: 100px;
            padding-left: 60px;
        }
        .slide-title {
            font-size: 40px;
            font-weight: 800;
            color: #FFFFFF;
        }
        .content-area {
            flex: 1;
            padding-top: 24px; /* reduced to save height */
            padding-left: 80px;
            padding-right: 80px;
            display: flex;
            flex-direction: column;
        }
        .headline {
            font-size: 36px;
            font-weight: 800;
            color: #D97706;
            margin-bottom: 30px; /* reduced */
            text-align: center;
        }
        .main-content {
            display: flex;
            gap: 40px; /* slightly reduced horizontally */
            align-items: center;
            margin-bottom: 20px; /* reduced */
        }
        .steps-list {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            gap: 20px; /* reduced */
        }
        .step-item {
            display: flex;
            align-items: flex-start;
            font-size: 28px;
            font-weight: 500;
            color: #2D3748;
            line-height: 1.6;
        }
        .step-number {
            background-color: #1A202C;
            color: #FFFFFF;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 800;
            font-size: 26px;
            margin-right: 25px;
            flex-shrink: 0;
            margin-top: 5px;
        }
        .highlight-red {
            color: #E53E3E;
            font-weight: 800;
        }
        .visual-area {
            flex: 0.8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #F7FAFC;
            border: 4px solid #E2E8F0;
            border-radius: 16px;
            height: 260px; /* reduced */
        }
        .exit-icon-circle {
            width: 130px; /* slightly reduced to fit */
            height: 130px;
            background-color: #E53E3E;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 16px;
        }
        .exit-icon-circle i {
            font-size: 72px; /* icon size adjusted, font-size change allowed for icons */
            color: #FFFFFF;
        }
        .icon-label {
            font-size: 28px;
            font-weight: 800;
            color: #1A202C;
        }
        .warning-box {
            background-color: #FFF5F5;
            border: 4px solid #E53E3E;
            border-radius: 16px;
            padding-top: 20px; /* reduced */
            padding-left: 20px; /* reduced */
            padding-right: 20px; /* reduced */
            height: 110px; /* reduced */
            margin-top: auto;
            margin-bottom: 20px; /* reduced */
        }
        .warning-text {
            font-size: 26px;
            font-weight: 800;
            color: #C53030;
            line-height: 1.6;
        }
    </style>

<style>
  [size="1"] { font-size: 12px !important; }
  [size="2"] { font-size: 14px !important; }
  [size="3"] { font-size: 16px !important; }
  [size="4"] { font-size: 24px !important; }
  [size="5"] { font-size: 32px !important; }
  [size="6"] { font-size: 48px !important; }
  [size="7"] { font-size: 72px !important; }

<body>
    <div class="slide-container">
        <div class="header">
            <h2 class="slide-title">会議を退出するには</h2>
        </div>
        
        <div class="content-area">
            <div class="headline">
                会議が終わったら「赤い受話器」をタップして退出しましょう
            </div>
            
            <div class="main-content">
                <div class="steps-list">
                    <div class="step-item">
                        <div class="step-number">1</div>
                        <div>画面を軽くタップしてボタンを表示させる</div>
                    </div>
                    <div class="step-item">
                        <div class="step-number">2</div>
                        <div>画面下中央の <span class="highlight-red">赤い受話器マーク</span> をタップ</div>
                    </div>
                    <div class="step-item">
                        <div class="step-number">3</div>
                        <div>「退出」を確認してタップ</div>
                    </div>
                </div>
                
                <div class="visual-area">
                    <div class="exit-icon-circle">
                        <i class="fas fa-phone-slash"></i>
                    </div>
                    <div class="icon-label">このボタンをタップ！</div>
                </div>
            </div>
            
            <div class="warning-box">
                <div class="warning-text">
                    <i class="fas fa-exclamation-triangle" style="margin-right: 15px;"></i>
                    ⚠️ アプリを閉じるだけでは退出にならない場合があります。<br>
                    必ず「赤い受話器」をタップして会議から抜けましょう。
                </div>
            </div>
        </div>
    </div>
