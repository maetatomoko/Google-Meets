<!DOCTYPE html>

<html lang="ja"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;800&amp;display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans JP', sans-serif; }
        .slide-container {
            width: 1280px;
            min-height: 720px; /* keep as required */
            background-color: #FFFFFF;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .header {
            background-color: #1A202C;
            padding-top: 30px; /* keep upper padding for title */
            height: 100px;
            padding-left: 60px;
        }
        .slide-title {
            font-size: 40px;
            font-weight: 800;
            color: #FFFFFF;
        }
        .content-area {
            flex: 1;
            padding-top: 40px;
            padding-left: 80px;
            padding-right: 80px;
            display: flex;
            flex-direction: column;
        }
        .headline {
            font-size: 36px;
            font-weight: 800;
            color: #D97706;
            margin-bottom: 20px; /* reduced from 40 to save height */
            text-align: center;
        }
        .button-list {
            display: flex;
            flex-direction: column;
            gap: 12px; /* reduced gap from 20 to 12 */
            margin-bottom: 20px; /* reduced from 30 */
        }
        .button-item {
            display: flex;
            align-items: center;
            background-color: #F7FAFC;
            border: 2px solid #E2E8F0;
            border-radius: 16px;
            padding-left: 32px;
            padding-right: 32px;
            height: 100px; /* reduced from 120 */
        }
        .icon-box {
            width: 64px; /* slightly reduced */
            height: 64px;
            border-radius: 50%;
            background-color: #E2E8F0;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 28px;
            flex-shrink: 0;
        }
        .icon-box i {
            font-size: 36px;
            color: #1A202C;
        }
        .icon-box.red-phone {
            background-color: #FED7D7;
        }
        .icon-box.red-phone i {
            color: #E53E3E;
        }
        .button-info {
            flex: 1;
        }
        .button-name {
            font-size: 32px;
            font-weight: 800;
            color: #1A202C;
        }
        .button-desc {
            font-size: 24px;
            font-weight: 500;
            color: #2D3748;
        }
        .button-action {
            font-size: 24px;
            font-weight: 800;
            color: #D97706;
            background-color: rgba(217, 119, 6, 0.1);
            padding-top: 10px;
            height: 44px; /* slightly reduced */
            padding-left: 16px;
            padding-right: 16px;
            border-radius: 8px;
            text-align: center;
        }
        .note-box {
            background-color: rgba(217, 119, 6, 0.1);
            border-left: 8px solid #D97706;
            padding-top: 12px; /* reduced padding */
            padding-left: 20px;
            padding-right: 20px;
            height: 96px; /* reduced from 120 */
            margin-top: 20px; /* avoid auto to keep predictable layout */
            margin-bottom: 20px;
        }
        .note-item {
            font-size: 24px;
            font-weight: 800;
            color: #2D3748;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }
        .note-item i {
            color: #D97706;
            margin-right: 12px;
            font-size: 28px;
        }
        .highlight-red {
            color: #E53E3E;
        }
    </style>
<!-- Manus style start -->
<style>
  [size="1"] { font-size: 12px !important; }
  [size="2"] { font-size: 14px !important; }
  [size="3"] { font-size: 16px !important; }
  [size="4"] { font-size: 24px !important; }
  [size="5"] { font-size: 32px !important; }
  [size="6"] { font-size: 48px !important; }
  [size="7"] { font-size: 72px !important; }
  </style>
<!-- Manus style end -->
</head>
<body>
    <div class="slide-container">
        <div class="header">
            <h2 class="slide-title">会議中の画面の見方</h2>
        </div>
        
        <div class="content-area">
            <div class="headline">
                画面に表示されるボタンの意味を覚えましょう
            </div>
            
            <div class="button-list">
                <!-- マイク -->
                <div class="button-item">
                    <div class="icon-box">
                        <i class="fas fa-microphone"></i>
                    </div>
                    <div class="button-info">
                        <div class="button-name">🎤 マイク</div>
                        <div class="button-desc">自分の声の ON / OFF</div>
                    </div>
                    <div class="button-action">タップで切り替え</div>
                </div>
                
                <!-- カメラ -->
                <div class="button-item">
                    <div class="icon-box">
                        <i class="fas fa-video"></i>
                    </div>
                    <div class="button-info">
                        <div class="button-name">📷 カメラ</div>
                        <div class="button-desc">自分の映像の ON / OFF</div>
                    </div>
                    <div class="button-action">タップで切り替え</div>
                </div>
                
                <!-- 赤い受話器 -->
                <div class="button-item">
                    <div class="icon-box red-phone">
                        <i class="fas fa-phone-slash"></i>
                    </div>
                    <div class="button-info">
                        <div class="button-name">📞 赤い受話器</div>
                        <div class="button-desc">会議を退出する</div>
                    </div>
                    <div class="button-action">タップで退出</div>
                </div>
            </div>
            
            <div class="note-box">
                <div class="note-item">
                    <i class="fas fa-info-circle"></i>
                    画面を軽くタップすると、これらのボタンが表示されます
                </div>
                <div class="note-item">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>マークが <span class="highlight-red">赤くなっている</span> ＝ OFF（相手に聞こえない・見えない）状態です</span>
                </div>
            </div>
        </div>
    </div>
